name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:unit

  integration:
    runs-on: ubuntu-latest
    services:
      couchdb:
        image: couchdb:3.3
        env:
          COUCHDB_USER: admin
          COUCHDB_PASSWORD: password
        ports:
          - 5984:5984
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5984/_up; then
              exit 0
            fi
            sleep 2
          done
          exit 1
      - run: npm run test:integration
        env:
          COUCHDB_URL: http://127.0.0.1:5984
          COUCHDB_USER: admin
          COUCHDB_PASSWORD: password
